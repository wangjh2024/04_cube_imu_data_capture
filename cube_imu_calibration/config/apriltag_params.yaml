calibration_gui:
  ros__parameters:
    image_topic: /camera/image_raw
    imu_topic: /imu
    camera_info_topic: /camera/camera_info
    cube_pose_topic: /cube_pose
    cube_pose_status_topic: /cube_pose_status
    recorder_status_topic: /data_recorder_node/status
    start_service: /data_recorder_node/start_recording
    stop_service: /data_recorder_node/stop_recording

    bag_path: output_bag
    record_duration_sec: 150.0

    enable_cube_detection: true

    # AprilTag 黑色外框边长，必须与打印模板一致；当前模板标注为 30mm。
    marker_size: 0.030
    # 折成立方体后的 Cube 外边长；当前实物确认也是 30mm。
    cube_visual_size: 0.030
    # 已确认模板："AprilTag 36h11 Cube - Left Hand Cube"。
    # ID 布局：Center=ID0, Top=ID1, Right=ID2, Bottom=ID3, Left=ID4。
    # 打印要求：100% 原始比例打印，不要选择“适应页面/缩放打印”。
    cube_layout: left_hand_5face

    # -1 表示接受打印 Cube 上的 ID0-4，并按上面的五面布局转换到 cube_link。
    target_tag_id: -1
    dictionary: DICT_APRILTAG_36h11

    camera_frame: camera_link
    cube_frame: cube_link
    imu_frame: imu_link
    # Formal calibration uses only the Cube-mounted serial IMU.
    # Do not replace this with the Orbbec/camera built-in IMU; that is camera-mounted.
    imu_source: cube_serial
    serial_port: /dev/ttyACM0
    serial_baudrate: 2000000
    serial_protocol_mode: v2.1
    serial_imu_rate_hz: 500.0
    serial_startup_command: uartout
    # Calibration only needs grayscale AprilTag images. mono8 cuts ROS image bandwidth
    # to one third of bgr8 and reduces GUI display conversion cost.
    camera_output_encoding: mono8
    color_fps: 15
    real_sensor_image_qos_depth: 30
    real_sensor_imu_qos_depth: 1000
    recorder_image_qos_depth: 120
    recorder_imu_qos_depth: 2000
    recorder_status_qos_depth: 100
    image_preview_rate_hz: 5.0
    tag_detection_rate_hz: 15.0
    # Run AprilTag detection on a downscaled grayscale image, then scale corners back
    # before solvePnP. This keeps live cube_pose near the target rate on 1280x720 input.
    tag_detection_scale: 0.5
    # GUI preview keeps source resolution for operator inspection; display rate limits load.
    preview_scale: 1.0
    gui_display_rate_hz: 5.0
    draw_preview_overlay: true
    publish_tf: true

    # GUI 预览态 CubePose CSV，未正式录制时写入 outputs/。
    # 正式录制开始后会切换到本次数据集目录 output_bag_YYYYMMDD_HHMMSS/tag_pose.csv。
    pose_csv_path: outputs/tag_pose.csv

data_recorder_node:
  ros__parameters:
    image_topic: /camera/image_raw
    imu_topic: /imu
    camera_info_topic: /camera/camera_info
    cube_pose_topic: /cube_pose
    cube_pose_status_topic: /cube_pose_status
    # 数据集目录前缀。正式录制时会自动生成 output_bag_YYYYMMDD_HHMMSS，
    # 避免覆盖旧数据，也方便按采集时间追溯。
    bag_path: output_bag
    storage_id: sqlite3
    start_recording: false
    # GUI performs per-phase pose checks before accumulating 150s of formal data.
    # Keep recorder manual-stop so pose-check time does not truncate formal capture.
    record_duration_sec: 0.0
    skip_zero_header_stamp: true
    status_period_sec: 5.0
    image_qos_depth: 120
    imu_qos_depth: 2000
    status_qos_depth: 100

real_sensor_node:
  ros__parameters:
    image_topic: /camera/image_raw
    imu_topic: /imu
    camera_info_topic: /camera/camera_info
    camera_frame: camera_link
    imu_frame: imu_link
    # /imu is the Cube-mounted serial IMU only. Orbbec/camera IMU is intentionally not used here.
    imu_source: cube_serial
    output_encoding: mono8
    color_width: 1280
    color_height: 720
    # 1280x720 BGR at 30 Hz overloaded the GUI/rosbag path in current tests.
    # Use 15 Hz as the capture default; GUI will refuse formal capture below 8 Hz.
    color_fps: 15
    frame_timeout_ms: 1000
    image_qos_depth: 30
    imu_qos_depth: 1000
    serial_imu_enabled: true
    serial_port: /dev/ttyACM0
    serial_baudrate: 2000000
    serial_protocol_mode: v2.1
    serial_imu_rate_hz: 500.0
    serial_startup_command: uartout
